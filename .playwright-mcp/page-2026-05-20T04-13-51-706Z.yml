            - generic [ref=e157]: WHAT IS REBIRTH?
            - paragraph [ref=e158]:
              - text: Released by Propellerhead Software in
              - strong [ref=e159]: "1997"
              - text: ","
              - strong [ref=e160]: ReBirth RB-338
              - text: was one of the first software synthesizers to faithfully emulate the
              - strong [ref=e161]: Roland TB-303
              - text: Bass Line and the Roland TR-808 / TR-909 drum machines. It became a cornerstone of electronic music production and is now freely available as abandonware.
          - article [ref=e162]:
            - generic [ref=e163]: WHAT IS THIS SITE?
            - paragraph [ref=e164]:
              - text: This community archive preserves
              - code [ref=e165]: .rbs
              - text: song files and
              - code [ref=e166]: .rbm
              - text: mod files contributed by enthusiasts worldwide. It also hosts historical documentation spanning versions
              - code [ref=e167]: "1.0"
              - text: through
              - code [ref=e168]: 2.0.1
              - text: and lays the groundwork for in-browser
              - code [ref=e169]: .rbs
              - text: preview via WebAssembly.
