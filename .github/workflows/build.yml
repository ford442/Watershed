name: Build

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-without-emscripten:
    name: Build without Emscripten
    runs-on: ubuntu-latest
    env:
      CI: true
      PUPPETEER_SKIP_DOWNLOAD: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Confirm Emscripten is absent
        run: |
          if command -v emcc >/dev/null 2>&1; then
            echo "emcc is unexpectedly available on this runner"
            exit 1
          fi

      - name: Create npm lockfile for CI install
        run: npm install --package-lock-only --ignore-scripts

      - name: Install dependencies
        run: npm ci

      - name: Validate documentation paths
        run: node scripts/validate-markdown-paths.js

      - name: Typecheck (typed surface)
        run: npm run typecheck

      - name: Build production bundle
        run: npm run build

      - name: Assert build output exists
        run: test -f build/index.html

      - name: Run test suite
        run: npm test

  build-with-emscripten:
    name: Build with Emscripten
    runs-on: ubuntu-latest
    env:
      CI: true
      WATERSHED_REQUIRE_WASM: "1"
      WATERSHED_WASM_INTEGRATION: "1"
      WATERSHED_WASM_MAX_BYTES: "131072"
      PUPPETEER_SKIP_DOWNLOAD: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.56

      - name: Create npm lockfile for CI install
        run: npm install --package-lock-only --ignore-scripts

      - name: Install dependencies
        run: npm ci

      - name: Validate documentation paths
        run: node scripts/validate-markdown-paths.js

      - name: Compile watershed_native.wasm
        run: npm run build:wasm

      - name: Assert WASM artifact exists and is within budget
        run: |
          test -f public/watershed_native.wasm
          test -f public/watershed_native.js
          WASM_SIZE=$(wc -c < public/watershed_native.wasm)
          echo "watershed_native.wasm size: ${WASM_SIZE} bytes"
          test "${WASM_SIZE}" -lt 131072

      - name: Run WASM integration tests against real binary
        run: |
          node emscripten/smoke_test.mjs
          npm run test:wasm

      - name: Compile threaded WASM variant
        run: npm run build:wasm:threads

      - name: Assert threaded WASM artifact exists
        run: test -f public/watershed_native.wasm
