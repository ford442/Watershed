name: Build

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-without-emscripten:
    name: Build without Emscripten
    runs-on: ubuntu-latest
    env:
      CI: true
      PUPPETEER_SKIP_DOWNLOAD: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Confirm Emscripten is absent
        run: |
          if command -v emcc >/dev/null 2>&1; then
            echo "emcc is unexpectedly available on this runner"
            exit 1
          fi

      - name: Create npm lockfile for CI install
        run: npm install --package-lock-only --ignore-scripts

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

      - name: Assert build output exists
        run: test -f build/index.html

      - name: Run test suite
        run: npm test -- --watchAll=false
